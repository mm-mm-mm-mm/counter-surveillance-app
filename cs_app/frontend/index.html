<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS App — Counter Surveillance</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- FILE SELECTOR SCREEN -->
  <div id="screen-selector" class="screen active">
    <div class="selector-box">
      <h1>Counter Surveillance</h1>
      <p class="subtitle">Select a video file to begin processing</p>
      <div id="status-banner" class="status-banner loading">
        <span class="spinner"></span> Loading ML models, please wait…
      </div>
      <ul id="video-list"></ul>
      <p id="no-videos" class="no-videos hidden">No video files found in <code>video_input/</code></p>
    </div>
  </div>

  <!-- PLAYER SCREEN -->
  <div id="screen-player" class="screen">
    <div class="player-layout">

      <!-- Left: video canvas + timestamp -->
      <div class="canvas-col">
        <div class="canvas-wrapper">
          <canvas id="video-canvas"></canvas>
        </div>
        <div id="timestamp-display" class="timestamp">—</div>
      </div>

      <!-- Right: observations panel -->
      <div class="obs-panel">
        <h2 class="panel-title">Current observations</h2>
        <ul id="observation-cards"></ul>
        <div id="session-complete" class="session-complete hidden">
          Session complete
        </div>
      </div>

    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
